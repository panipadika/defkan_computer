[phases.setup]
nixPkgs = ['php82', 'php82Extensions.pdo', 'php82Extensions.pdo_mysql', 'php82Extensions.mbstring', 'php82Extensions.tokenizer', 'php82Extensions.xml', 'php82Extensions.ctype', 'php82Extensions.curl', 'php82Extensions.gd', 'php82Extensions.zip', 'php82Extensions.fileinfo', 'php82Extensions.openssl', 'php82Extensions.bcmath', 'nodejs_18', 'nodePackages.npm']

[phases.install]
cmds = [
  'composer install --no-dev --optimize-autoloader --no-interaction',
  'npm install',
  'npm run build',
  'mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions',
  'chmod -R 775 storage bootstrap/cache'
]

[start]
cmd = 'php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan storage:link && php -S 0.0.0.0:$PORT -t public'
